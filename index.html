    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFF5EE;
        }

        /* ── Tab underline animation ── */
        .tab-btn {
            position: relative;
            transition: color 0.3s ease;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #D4A0A0;
            transition: width 0.35s ease, left 0.35s ease;
            border-radius: 999px;
        }
        .tab-btn.active::after {
            width: 100%;
            left: 0;
        }
        .tab-btn.active {
            color: #D4A0A0;
        }

        /* ── Fade helpers ── */
        .fade-enter {
            opacity: 0;
            transform: translateY(12px);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* ── SVG flower sway ── */
        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50%      { transform: rotate(2deg); }
        }
        .sway {
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom center;
        }
        .sway-delay-1 { animation-delay: 0.3s; }
        .sway-delay-2 { animation-delay: 0.7s; }
        .sway-delay-3 { animation-delay: 1.1s; }
        .sway-delay-4 { animation-delay: 0.5s; }
        .sway-delay-5 { animation-delay: 0.9s; }
        .sway-delay-6 { animation-delay: 1.3s; }

        /* ── Grow-up animation ── */
        @keyframes growUp {
            0%   { transform: scaleY(0) translateY(20px); opacity: 0; }
            60%  { transform: scaleY(1.05) translateY(-4px); opacity: 1; }
            100% { transform: scaleY(1) translateY(0); opacity: 1; }
        }
        .flower-group {
            transform-origin: bottom center;
            opacity: 0;
            transform: scaleY(0) translateY(20px);
        }
        .flower-group.bloom {
            animation: growUp 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ── Petal subtle pulse ── */
        @keyframes petalPulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.04); }
        }
        .petal-pulse {
            animation: petalPulse 4s ease-in-out infinite;
        }

        /* ── Card subtle float ── */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }
        .card-float {
            animation: float 6s ease-in-out infinite;
        }

        /* ── Heart beat on note page ── */
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            14%      { transform: scale(1.15); }
            28%      { transform: scale(1); }
            42%      { transform: scale(1.1); }
            56%      { transform: scale(1); }
        }
        .heart-beat {
            animation: heartBeat 2.5s ease-in-out infinite;
        }

        /* ── Button shimmer ── */
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .btn-shimmer {
            background: linear-gradient(90deg, #D4A0A0 0%, #E8C4C4 25%, #D4A0A0 50%, #C3B1E1 75%, #D4A0A0 100%);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        /* Smooth page transitions */
        .page { display: none; }
        .page.active { display: block; }
    </style>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        /* ── Tab switching ── */
        const tabs  = document.querySelectorAll('.tab-btn');
        const pages = document.querySelectorAll('.page');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;

                // Update tab styles
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Switch pages
                pages.forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${target}`).classList.add('active');
            });
        });

        /* ── Bloom interaction ── */
        const bloomBtn       = document.getElementById('bloom-btn');
        const bloomCta       = document.getElementById('bloom-cta');
        const bouquetContainer = document.getElementById('bouquet-container');
        const bouquetMessage = document.getElementById('bouquet-message');
        const flowerGroups   = document.querySelectorAll('.flower-group');

        let hasBlossomed = false;

        bloomBtn.addEventListener('click', () => {
            if (hasBlossomed) return;
            hasBlossomed = true;

            // Fade out the CTA
            bloomCta.style.opacity = '0';
            bloomCta.style.pointerEvents = 'none';

            setTimeout(() => {
                bloomCta.style.display = 'none';
                bouquetContainer.classList.remove('hidden');
                bouquetContainer.style.display = 'flex';

                // Trigger each flower group with staggered delays
                flowerGroups.forEach(group => {
                    const delay = parseInt(group.dataset.delay) || 0;
                    setTimeout(() => {
                        group.classList.add('bloom');
                    }, delay);
                });

                // Show the final message after all flowers have bloomed
                const maxDelay = Math.max(
                    ...Array.from(flowerGroups).map(g => parseInt(g.dataset.delay) || 0)
                );
                setTimeout(() => {
                    bouquetMessage.style.opacity = '1';
                }, maxDelay + 1400);

            }, 700); // Wait for CTA fade-out
        });
    </script>
</body>
</html>
